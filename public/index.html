<!DOCTYPE html>
<html>
<head>
    <title>API Testing & Monitoring Tool</title>
    <link rel="stylesheet" href="style.css">

    <!-- 📊 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1>🚀 API Testing Tool</h1>

    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <input type="text" id="url" placeholder="Enter API URL">

    <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
    </select>

    <textarea id="body" placeholder="Enter JSON body"></textarea>

    <button onclick="testAPI()">Send Request</button>
    <button onclick="clearResult()">Clear</button>

    <p id="loading"></p>

    <pre id="result"></pre>

    <h3>📊 Response Time Graph</h3>
    <canvas id="responseChart"></canvas>

    <h3>📜 API History</h3>
    <ul id="historyList"></ul>

</div>

<!-- 🧠 Script -->
<script src="script.js"></script>

</body>
</html>
