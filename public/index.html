<!DOCTYPE html>
<html>
<head>
    <title>API Testing Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h2>🚀 API Tester</h2>

        <button onclick="toggleDarkMode()">🌙 Dark</button>

        <input type="text" id="url" placeholder="Enter API URL">
<input type="file" id="importFile" accept=".json" />
<button onclick="importCollection()">Import Collection</button>
<input type="file" id="importFile" accept=".json">
<button onclick="importCollection()">Import Postman</button>

<div id="apiList"></div>
        <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
        </select>

        <textarea id="body" placeholder="Enter JSON body"></textarea>

        <div class="btn-group">
            <button onclick="testAPI()">Send</button>
            <button onclick="clearResult()">Clear</button>
            <button onclick="copyResponse()">Copy</button>
            <button onclick="downloadResponse()">Download</button>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <!-- Tabs -->
        <div class="tabs">
            <button onclick="showTab('response')">Response</button>
            <button onclick="showTab('graph')">Graph</button>
            <button onclick="showTab('history')">History</button>
        </div>

        <!-- RESPONSE TAB -->
        <div id="response" class="tab-content" style="display:block;">
            <p id="loading"></p>
            <pre id="result"></pre>
        </div>

        <!-- GRAPH TAB -->
        <div id="graph" class="tab-content" style="display:none;">
            <canvas id="responseChart"></canvas>
        </div>

        <!-- HISTORY TAB -->
        <div id="history" class="tab-content" style="display:none;">
            <ul id="historyList"></ul>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
